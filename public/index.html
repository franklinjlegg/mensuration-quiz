<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Mensuration Exam Prep (Cloud Edition)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <div id="dashboard-screen">
            <h1>Mensuration Mastery</h1>
            <div id="auth-section">
                <div id="logged-out-ui">
                    <p style="margin-top: 0; color: #64748b;">Sign in to sync your progress across devices.</p>
                    <button class="auth-btn" id="login-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Sign in with Google
                    </button>
                </div>
                <div id="logged-in-ui" class="hidden">
                    <div class="user-info" id="user-display-name">Welcome, Student</div>
                    <button class="sign-out-btn" id="logout-btn">Sign Out</button>
                </div>
            </div>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="quiz-header">
                <span id="level-indicator">Level 1 <span id="hard-mode-indicator" class="hidden">(HARD MODE)</span></span>
                <span id="progress-indicator">Q: 1/10</span>
            </div>
            <div id="question-text">Question goes here?</div>
            
            <div id="options-container"></div>
            
            <div id="manual-container" class="manual-input-container hidden">
                <input type="text" id="manual-answer" placeholder="Type your exact answer..." autocomplete="off">
                <button id="submit-manual-btn" class="btn-primary btn-action" onclick="checkManualAnswer()">Submit Answer</button>
                <div id="feedback-msg"></div>
            </div>

            <button id="next-btn" class="btn-primary hidden" onclick="nextQuestion()">Next Question</button>
            <button class="btn-secondary" onclick="returnToDashboard()">Save & Quit to Menu</button>
        </div>

        <div id="results-screen" class="hidden">
            <h2 style="text-align:center; font-size: 2rem;">Module Complete!</h2>
            <div class="result-large" id="final-score">8 / 10</div>
            <p style="text-align: center; font-size: 1.4rem; font-weight: bold; color: #475569; margin-bottom: 10px;">Completion Time: <span id="final-time">0.0</span>s</p>
            <p id="streak-update-msg" style="text-align: center; font-size: 1.1rem; color: var(--hard-mode); font-weight: bold; margin-bottom: 30px;"></p>
            <button class="btn-primary" onclick="returnToDashboard()">Return to Dashboard</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
